services:
  app:
    build: .
    container_name: bun-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - '8010'
    depends_on:
      - mongodb
      - redis
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.bun-app.rule=Host(`amdaani.v1.amptechnology.in`)'
      - 'traefik.http.routers.bun-app.entrypoints=websecure'
      - 'traefik.http.routers.bun-app.tls=true'
      - 'traefik.http.routers.bun-app.tls.certresolver=letsencrypt'
      - 'traefik.http.services.bun-app.loadbalancer.server.port=8010'
    networks:
      - coolify

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - coolify

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - coolify

volumes:
  mongodb-data:
  redis-data:

networks:
  coolify:
    external: true

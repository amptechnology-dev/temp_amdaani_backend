services:
  # ── Bun / Express App ───────────────────────────
  app:
    build: .
    container_name: bun-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - '8000'
    labels:
      - 'traefik.enable=true'

      # Domain (Coolify will also manage this)
      - 'traefik.http.routers.app.rule=Host(`amdaani.pos-dev.amptechnology.in`)'

      # HTTPS handled by Coolify
      - 'traefik.http.routers.app.entrypoints=websecure'

      # Internal app port
      - 'traefik.http.services.app.loadbalancer.server.port=8000'

    depends_on:
      - mongodb
      - redis

  # ── MongoDB (SIMPLE - NO REPLICA, NO AUTH) ──────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mongodb-data:
  redis-data:

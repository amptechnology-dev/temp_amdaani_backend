version: '3.9'

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    expose:
      - '8000'

  cron:
    build: .
    restart: unless-stopped
    command: ['bun', 'run', 'cron']
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ['--replSet', 'rs0']
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mongodb-data:
  redis-data:

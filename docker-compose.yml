services:
  # ── Bun/Express App ─────────────────────────────
  app:
    build: .
    container_name: bun-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - '8000'
    labels:
      - 'traefik.enable=true'

      # Domain routing (handled by Coolify Traefik)
      - 'traefik.http.routers.app.rule=Host(`amdaani.pos-dev.amptechnology.in`)'

      # Tell Coolify which port your app runs on
      - 'traefik.http.services.app.loadbalancer.server.port=8000'

    depends_on:
      - mongodb
      - redis

  # ── MongoDB ─────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    command: ['--replSet', 'rs0']
    volumes:
      - mongodb-data:/data/db

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mongodb-data:
  redis-data:

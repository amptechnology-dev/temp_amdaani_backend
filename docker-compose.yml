services:
  app:
    build: .
    container_name: bun-app
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - '27017:27017'
    command: ['--replSet', 'rs0']
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mongodb-data:
  redis-data:
